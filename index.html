<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valvet Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-gray-950 text-gray-100">

  <div id="login-screen" class="hidden flex items-center justify-center min-h-screen">
    <div class="w-full max-w-sm p-8 bg-gray-900 rounded-2xl shadow-lg border border-gray-800">
      <div class="flex justify-center mb-2">
        <img src="valvet-logo.svg" alt="Valvet" class="h-16 w-auto" />
      </div>
      <p class="mb-8 text-sm text-gray-500 text-center">Logga in på din dashboard</p>
      <div id="login-error" class="hidden mb-4 p-3 text-sm text-red-400 bg-red-900/30 rounded-xl"></div>
      <form id="login-form" class="flex flex-col gap-4">
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-400">E-post</label>
          <input id="login-email" type="email" required class="block w-full px-4 py-3 text-sm text-gray-200 bg-gray-800 rounded-xl border border-gray-700 focus:outline-none focus:ring-2 focus:ring-orange-500/50" placeholder="du@example.com" />
        </div>
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-400">Lösenord</label>
          <input id="login-password" type="password" required class="block w-full px-4 py-3 text-sm text-gray-200 bg-gray-800 rounded-xl border border-gray-700 focus:outline-none focus:ring-2 focus:ring-orange-500/50" placeholder="Ditt lösenord" />
        </div>
        <button type="submit" class="w-full px-4 py-3 text-sm font-semibold text-white bg-orange-500 rounded-xl hover:bg-orange-600 transition-colors">Logga in</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="flex min-h-screen">

      <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden"></div>

      <aside id="sidebar" class="fixed flex flex-col w-72 h-screen p-6 bg-gray-900 border-r border-gray-800 z-50 -translate-x-full transition-transform lg:translate-x-0">
        <div class="mb-8">
          <img src="valvet-logo.svg" alt="Valvet" class="h-16 w-auto" />
        </div>

        <nav class="flex flex-col flex-1 gap-1">
          <button id="nav-summary" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-orange-400 bg-orange-500/10 rounded-xl" onclick="navigateTo('summary')">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" />
            </svg>
            Översikt
          </button>

          <div class="mt-6 mb-2 px-4">
            <span class="text-xs font-semibold tracking-wider text-gray-600 uppercase">Konsulter</span>
          </div>

          <div id="consultant-list" class="flex flex-col gap-1 overflow-y-auto"></div>

          <div class="mt-auto flex flex-col gap-1 pt-4 border-t border-gray-800">
            <button class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-400 rounded-xl hover:bg-gray-800" onclick="handleLogout()">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Logga ut
            </button>
          </div>
        </nav>
      </aside>

      <main class="flex-1 px-4 py-6 sm:px-6 md:px-8 lg:ml-72">
        <div class="flex items-center gap-4 mb-8">
          <button id="menu-btn" class="flex items-center justify-center w-10 h-10 text-gray-400 bg-gray-800 rounded-xl border border-gray-700 lg:hidden" onclick="toggleSidebar()">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="relative flex-1">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input class="block w-full pl-10 pr-4 py-3 text-sm text-gray-200 bg-gray-800 rounded-xl border border-gray-700 focus:outline-none focus:ring-2 focus:ring-orange-500/50" type="text" placeholder="Sök kund, konsult, uppdrag..." />
          </div>
          <button class="flex items-center gap-2 px-4 py-3 text-sm font-medium text-white bg-orange-500 rounded-xl hover:bg-orange-600 transition-colors" onclick="navigateTo('add')">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Lägg till konsult
          </button>
        </div>

        <div id="main-content"></div>
      </main>
    </div>
  </div>

  <div id="delete-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/60">
    <div class="w-full max-w-sm p-6 bg-gray-800 rounded-2xl shadow-lg border border-gray-700">
      <h3 class="mb-2 text-lg font-semibold text-gray-100">Radera konsult</h3>
      <p class="mb-6 text-sm text-gray-400">Är du säker? Detta raderar konsulten och alla tillhörande uppdrag permanent.</p>
      <div class="flex gap-3 justify-end">
        <button class="px-4 py-2 text-sm font-medium text-gray-300 bg-gray-700 rounded-xl hover:bg-gray-600" onclick="closeDeleteModal()">Avbryt</button>
        <button id="confirm-delete-btn" class="px-4 py-2 text-sm font-medium text-white bg-red-500 rounded-xl hover:bg-red-600">Radera</button>
      </div>
    </div>
  </div>

<script>
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

let consultants = [];
let currentView = { type: "summary" };
let deleteTargetId = null;

const avatarColors = [
  { bg: "bg-orange-900/40", text: "text-orange-400" },
  { bg: "bg-purple-900/40", text: "text-purple-400" },
  { bg: "bg-blue-900/40", text: "text-blue-400" },
  { bg: "bg-green-900/40", text: "text-green-400" },
  { bg: "bg-rose-900/40", text: "text-rose-400" },
  { bg: "bg-teal-900/40", text: "text-teal-400" }
];

const skillColors = [
  { bg: "bg-purple-900/30", text: "text-purple-400" },
  { bg: "bg-blue-900/30", text: "text-blue-400" },
  { bg: "bg-green-900/30", text: "text-green-400" },
  { bg: "bg-orange-900/30", text: "text-orange-400" },
  { bg: "bg-rose-900/30", text: "text-rose-400" },
  { bg: "bg-teal-900/30", text: "text-teal-400" }
];

function formatCurrency(num) {
  return num.toLocaleString("sv-SE") + " kr";
}

function formatDate(dateStr) {
  if (!dateStr) return "—";
  const d = new Date(dateStr);
  return d.toLocaleDateString("sv-SE", { year: "numeric", month: "short" });
}

function getEndDateColor(endDateStr) {
  if (!endDateStr) return { badge: "text-gray-400 bg-gray-700", bar: "bg-gray-600", label: "Inget slutdatum" };
  const now = new Date();
  const end = new Date(endDateStr);
  const diffMs = end - now;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  const diffMonths = diffDays / 30.44;

  if (diffMonths >= 2) return { badge: "text-green-400 bg-green-900/30", bar: "bg-green-500", label: "Aktiv" };
  if (diffMonths >= 1) return { badge: "text-yellow-400 bg-yellow-900/30", bar: "bg-yellow-500", label: "Avslutas snart" };
  if (diffDays > 0) return { badge: "text-red-400 bg-red-900/30", bar: "bg-red-500", label: "Avslutas mycket snart" };
  return { badge: "text-gray-400 bg-gray-700", bar: "bg-gray-500", label: "Avslutat" };
}

function createProgressRing(percentage, color) {
  const offset = 100 - percentage;
  return `
    <svg class="w-20 h-20" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#374151" stroke-width="3" />
      <circle cx="18" cy="18" r="15.9155" fill="none" stroke="${color}" stroke-width="3"
        stroke-dasharray="100" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="transform: rotate(-90deg); transform-origin: center;" />
      <text x="18" y="20.5" text-anchor="middle" font-size="7" font-weight="bold" fill="#F3F4F6">${percentage}%</text>
    </svg>
  `;
}

async function fetchConsultants() {
  const { data, error } = await db
    .from("consultants")
    .select("*, previous_assignments(*)")
    .order("name");

  if (error) {
    console.error("Fel vid hämtning av konsulter:", error);
    return;
  }

  consultants = data || [];
}

async function deleteConsultant(id) {
  const { error } = await db.from("consultants").delete().eq("id", id);
  if (error) {
    alert("Fel vid radering av konsult: " + error.message);
    return;
  }
  await fetchConsultants();
  navigateTo("summary");
  renderSidebarList();
}

async function deleteAssignment(assignmentId, consultantId) {
  const { error } = await db.from("previous_assignments").delete().eq("id", assignmentId);
  if (error) {
    alert("Fel vid radering av uppdrag: " + error.message);
    return;
  }
  await fetchConsultants();
  renderSidebarList();
  navigateTo("consultant", consultantId);
}

function openDeleteModal(id) {
  deleteTargetId = id;
  document.getElementById("delete-modal").classList.remove("hidden");
}

function closeDeleteModal() {
  deleteTargetId = null;
  document.getElementById("delete-modal").classList.add("hidden");
}

function renderSidebarList() {
  const list = document.getElementById("consultant-list");
  if (consultants.length === 0) {
    list.innerHTML = `<p class="px-4 py-3 text-sm text-gray-500">Inga konsulter ännu</p>`;
    return;
  }
  list.innerHTML = consultants.map((c, i) => {
    const color = avatarColors[i % avatarColors.length];
    return `
      <button data-id="${c.id}" class="nav-consultant flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-400 rounded-xl hover:bg-gray-800" onclick="navigateTo('consultant', '${c.id}')">
        <div class="flex items-center justify-center w-8 h-8 text-xs font-bold ${color.text} ${color.bg} rounded-full">${c.initials}</div>
        ${c.name}
      </button>
    `;
  }).join("");
}

function updateSidebarActive() {
  const summaryBtn = document.getElementById("nav-summary");
  const consultantBtns = document.querySelectorAll(".nav-consultant");

  if (currentView.type === "summary" || currentView.type === "add") {
    summaryBtn.className = "flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-orange-400 bg-orange-500/10 rounded-xl";
  } else {
    summaryBtn.className = "flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-400 rounded-xl hover:bg-gray-800";
  }

  consultantBtns.forEach(btn => {
    const id = btn.dataset.id;
    if (currentView.type === "consultant" && currentView.id === id) {
      btn.className = "nav-consultant flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-orange-400 bg-orange-500/10 rounded-xl";
    } else {
      btn.className = "nav-consultant flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-400 rounded-xl hover:bg-gray-800";
    }
  });
}

function navigateTo(type, id) {
  currentView = id ? { type, id } : { type };
  renderView();
  updateSidebarActive();

  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if (!sidebar.classList.contains("-translate-x-full") && window.innerWidth < 1024) {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
  }
}

function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  sidebar.classList.toggle("-translate-x-full");
  overlay.classList.toggle("hidden");
}

function renderView() {
  const container = document.getElementById("main-content");
  if (currentView.type === "summary") {
    container.innerHTML = renderSummary();
  } else if (currentView.type === "add") {
    container.innerHTML = renderAddForm();
    attachFormListeners();
  } else {
    container.innerHTML = renderConsultant(currentView.id);
    attachAssignmentFormListeners(currentView.id);
  }
}

function renderSummary() {
  if (consultants.length === 0) {
    return `
      <h1 class="mb-6 text-2xl font-bold text-gray-100">Översikt</h1>
      <div class="flex flex-col items-center justify-center p-12 bg-gray-800 rounded-2xl border border-gray-700">
        <svg class="w-16 h-16 mb-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <p class="mb-2 text-lg font-semibold text-gray-300">Inga konsulter ännu</p>
        <p class="mb-6 text-sm text-gray-500">Kom igång genom att lägga till din första konsult.</p>
        <button class="px-6 py-3 text-sm font-semibold text-white bg-orange-500 rounded-xl hover:bg-orange-600" onclick="navigateTo('add')">Lägg till din första konsult</button>
      </div>
    `;
  }

  const totalRevenue = consultants.reduce((sum, c) => sum + (c.total_revenue || 0), 0);
  const avgMargin = Math.round(consultants.reduce((sum, c) => sum + (c.margin || 0), 0) / consultants.length);
  const activeAssignments = consultants.filter(c => c.current_customer).length;
  const totalHours = consultants.reduce((sum, c) => sum + (c.hours_per_month || 0), 0);

  const metricsHTML = `
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
      <div class="flex flex-col p-6 bg-gray-800 rounded-2xl border border-gray-700">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-400">Total omsättning</span>
          <div class="flex items-center justify-center w-10 h-10 bg-green-900/30 rounded-xl">
            <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-100">${formatCurrency(totalRevenue)}</span>
        <span class="mt-1 text-xs text-green-400">Aktiv period</span>
      </div>

      <div class="flex flex-col items-center p-6 bg-gray-800 rounded-2xl border border-gray-700">
        <span class="mb-3 text-sm font-medium text-gray-400">Snittmarginal</span>
        ${createProgressRing(avgMargin, "#A78BFA")}
      </div>

      <div class="flex flex-col p-6 bg-gray-800 rounded-2xl border border-gray-700">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-400">Aktiva uppdrag</span>
          <div class="flex items-center justify-center w-10 h-10 bg-blue-900/30 rounded-xl">
            <svg class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-100">${activeAssignments}</span>
        <span class="mt-1 text-xs text-blue-400">${activeAssignments} konsulter placerade</span>
      </div>

      <div class="flex flex-col p-6 bg-gray-800 rounded-2xl border border-gray-700">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-400">Timmar denna månad</span>
          <div class="flex items-center justify-center w-10 h-10 bg-orange-900/30 rounded-xl">
            <svg class="w-5 h-5 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-100">${totalHours.toLocaleString("sv-SE")} h</span>
        <span class="mt-1 text-xs text-orange-400">Sammanlagt per månad</span>
      </div>
    </div>
  `;

  const cardsHTML = consultants.map((c, i) => {
    const color = avatarColors[i % avatarColors.length];
    const endColor = getEndDateColor(c.end_date);
    const skillsHTML = (c.skills || []).map((s, si) => {
      const sc = skillColors[si % skillColors.length];
      return `<span class="px-2 py-1 text-xs ${sc.text} ${sc.bg} rounded-full">${s}</span>`;
    }).join("");

    return `
      <div class="flex flex-col p-6 bg-gray-800 rounded-2xl border border-gray-700 cursor-pointer hover:border-gray-600 transition-colors" onclick="navigateTo('consultant', '${c.id}')">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-10 h-10 text-sm font-bold ${color.text} ${color.bg} rounded-full">${c.initials}</div>
            <div>
              <h3 class="text-sm font-semibold text-gray-100">${c.name}</h3>
              <p class="text-xs text-gray-500">${c.current_customer || "Ej tilldelad"}</p>
            </div>
          </div>
          <span class="px-2 py-1 text-xs font-medium ${endColor.badge} rounded-full">${endColor.label}</span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <p class="text-xs text-gray-500">Pris</p>
            <p class="text-sm font-semibold text-gray-100">${c.price} kr/h</p>
          </div>
          <div>
            <p class="text-xs text-gray-500">Marginal</p>
            <p class="text-sm font-semibold text-green-400">${c.margin}%</p>
          </div>
          <div>
            <p class="text-xs text-gray-500">Start</p>
            <p class="text-sm font-semibold text-gray-100">${formatDate(c.start_date)}</p>
          </div>
          <div>
            <p class="text-xs text-gray-500">Slut</p>
            <p class="text-sm font-semibold text-gray-100">${formatDate(c.end_date)}</p>
          </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
          ${skillsHTML}
        </div>

        <div class="mt-auto">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs text-gray-500">Marginal</span>
            <span class="text-xs font-medium text-gray-400">${c.margin}%</span>
          </div>
          <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
            <div class="h-full ${endColor.bar} rounded-full" style="width: ${c.margin}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join("");

  return `
    <h1 class="mb-6 text-2xl font-bold text-gray-100">Översikt</h1>
    ${metricsHTML}
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-lg font-semibold text-gray-100">Konsulter & Uppdrag</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      ${cardsHTML}
    </div>
  `;
}

function renderConsultant(id) {
  const c = consultants.find(x => x.id === id);
  if (!c) return "<p class='text-gray-400'>Konsulten hittades inte.</p>";

  const colorIdx = consultants.indexOf(c);
  const color = avatarColors[colorIdx % avatarColors.length];
  const endColor = getEndDateColor(c.end_date);
  const prevAssignments = c.previous_assignments || [];

  const metricsHTML = `
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
      <div class="flex flex-col p-6 bg-gray-800 rounded-2xl border border-gray-700">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-400">Total omsättning</span>
          <div class="flex items-center justify-center w-10 h-10 bg-green-900/30 rounded-xl">
            <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-100">${formatCurrency(c.total_revenue || 0)}</span>
        <span class="mt-1 text-xs text-green-400">Nuvarande uppdrag</span>
      </div>

      <div class="flex flex-col items-center p-6 bg-gray-800 rounded-2xl border border-gray-700">
        <span class="mb-3 text-sm font-medium text-gray-400">Ackumulerad marginal</span>
        ${createProgressRing(c.margin || 0, "#A78BFA")}
        <span class="mt-2 text-sm font-semibold text-gray-100">${formatCurrency(c.accumulated_margin || 0)}</span>
      </div>

      <div class="flex flex-col p-6 bg-gray-800 rounded-2xl border border-gray-700">
        <div class="flex items-center justify-between mb-4">

function attachFormListeners() {
  const form = document.getElementById("add-form");
  if (!form) return;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const errorEl = document.getElementById("form-error");

    const name = fd.get("name").trim();
    const initials = fd.get("initials").trim().toUpperCase();

    if (!name || !initials) {
      errorEl.textContent = "Namn och initialer krävs.";
      errorEl.classList.remove("hidden");
      return;
    }

    const skillsRaw = fd.get("skills").trim();
    const skills = skillsRaw ? skillsRaw.split(",").map(s => s.trim()).filter(Boolean) : [];

    const row = {
      name,
      initials,
      current_customer: fd.get("current_customer").trim() || null,
      start_date: fd.get("start_date") || null,
      end_date: fd.get("end_date") || null,
      price: parseInt(fd.get("price")) || 0,
      margin: parseInt(fd.get("margin")) || 0,
      total_revenue: parseInt(fd.get("total_revenue")) || 0,
      accumulated_margin: parseInt(fd.get("accumulated_margin")) || 0,
      hours_per_month: parseInt(fd.get("hours_per_month")) || 0,
      skills
    };

    const { error } = await db.from("consultants").insert([row]);

    if (error) {
      errorEl.textContent = "Fel vid tillägg av konsult: " + error.message;
      errorEl.classList.remove("hidden");
      return;
    }

    await fetchConsultants();
    renderSidebarList();
    navigateTo("summary");
  });
}

function attachAssignmentFormListeners(consultantId) {
  const form = document.getElementById("assignment-form");
  if (!form) return;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const errorEl = document.getElementById("assignment-form-error");

    const customer = fd.get("customer").trim();
    if (!customer) {
      errorEl.textContent = "Kundnamn krävs.";
      errorEl.classList.remove("hidden");
      return;
    }

    const row = {
      consultant_id: consultantId,
      customer,
      start_date: fd.get("start_date") || null,
      end_date: fd.get("end_date") || null,
      price: parseInt(fd.get("price")) || 0,
      margin: parseInt(fd.get("margin")) || 0
    };

    const { error } = await db.from("previous_assignments").insert([row]);

    if (error) {
      errorEl.textContent = "Fel vid tillägg av uppdrag: " + error.message;
      errorEl.classList.remove("hidden");
      return;
    }

    await fetchConsultants();
    renderSidebarList();
    navigateTo("consultant", consultantId);
  });
}

async function handleLogin(email, password) {
  const { error } = await db.auth.signInWithPassword({ email, password });
  return error;
}

async function handleLogout() {
  await db.auth.signOut();
  showLogin();
}

function showLogin() {
  document.getElementById("login-screen").classList.remove("hidden");
  document.getElementById("app").classList.add("hidden");
}

async function showApp() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  await fetchConsultants();
  renderSidebarList();
  renderView();
  updateSidebarActive();
}

document.getElementById("sidebar-overlay").addEventListener("click", () => {
  document.getElementById("sidebar").classList.add("-translate-x-full");
  document.getElementById("sidebar-overlay").classList.add("hidden");
});

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("login-email").value;
  const password = document.getElementById("login-password").value;
  const errorEl = document.getElementById("login-error");

  errorEl.classList.add("hidden");

  const error = await handleLogin(email, password);
  if (error) {
    errorEl.textContent = error.message;
    errorEl.classList.remove("hidden");
    return;
  }

  await showApp();
});

document.getElementById("confirm-delete-btn").addEventListener("click", async () => {
  if (deleteTargetId) {
    await deleteConsultant(deleteTargetId);
    closeDeleteModal();
  }
});

document.addEventListener("DOMContentLoaded", async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    await showApp();
  } else {
    showLogin();
  }
});
