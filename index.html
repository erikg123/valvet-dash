<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valvet Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-stone-50 text-gray-900">

  <div id="login-screen" class="hidden flex items-center justify-center min-h-screen">
    <div class="w-full max-w-sm p-8 bg-white rounded-2xl shadow-sm">
      <h1 class="mb-2 text-2xl font-bold text-orange-500 text-center">Valvet</h1>
      <p class="mb-8 text-sm text-gray-400 text-center">Sign in to your dashboard</p>
      <div id="login-error" class="hidden mb-4 p-3 text-sm text-red-700 bg-red-50 rounded-xl"></div>
      <form id="login-form" class="flex flex-col gap-4">
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Email</label>
          <input id="login-email" type="email" required class="block w-full px-4 py-3 text-sm text-gray-700 bg-stone-50 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-300" placeholder="you@example.com" />
        </div>
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Password</label>
          <input id="login-password" type="password" required class="block w-full px-4 py-3 text-sm text-gray-700 bg-stone-50 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-300" placeholder="Your password" />
        </div>
        <button type="submit" class="w-full px-4 py-3 text-sm font-semibold text-white bg-orange-500 rounded-xl hover:bg-orange-600 transition-colors">Sign In</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="flex min-h-screen">

      <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/30 z-40 lg:hidden"></div>

      <aside id="sidebar" class="fixed flex flex-col w-72 h-screen p-6 bg-white border-r border-gray-100 z-50 -translate-x-full transition-transform lg:translate-x-0">
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-orange-500">Valvet</h1>
        </div>

        <nav class="flex flex-col flex-1 gap-1">
          <button id="nav-summary" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-orange-600 bg-orange-50 rounded-xl" onclick="navigateTo('summary')">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" />
            </svg>
            Dashboard
          </button>

          <div class="mt-6 mb-2 px-4">
            <span class="text-xs font-semibold tracking-wider text-gray-400 uppercase">Consultants</span>
          </div>

          <div id="consultant-list" class="flex flex-col gap-1 overflow-y-auto"></div>

          <div class="mt-auto flex flex-col gap-1 pt-4 border-t border-gray-100">
            <button class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-500 rounded-xl hover:bg-gray-50" onclick="handleLogout()">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Log Out
            </button>
          </div>
        </nav>
      </aside>

      <main class="flex-1 px-4 py-6 sm:px-6 md:px-8 lg:ml-72">
        <div class="flex items-center gap-4 mb-8">
          <button id="menu-btn" class="flex items-center justify-center w-10 h-10 text-gray-500 bg-white rounded-xl shadow-sm border border-gray-200 lg:hidden" onclick="toggleSidebar()">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="relative flex-1">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input class="block w-full pl-10 pr-4 py-3 text-sm text-gray-700 bg-white rounded-xl shadow-sm border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-300" type="text" placeholder="Search customer, consultant, assignment..." />
          </div>
          <button class="flex items-center gap-2 px-4 py-3 text-sm font-medium text-white bg-orange-500 rounded-xl shadow-sm hover:bg-orange-600 transition-colors" onclick="navigateTo('add')">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Add Consultant
          </button>
        </div>

        <div id="main-content"></div>
      </main>
    </div>
  </div>

  <div id="delete-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/40">
    <div class="w-full max-w-sm p-6 bg-white rounded-2xl shadow-lg">
      <h3 class="mb-2 text-lg font-semibold text-gray-900">Delete Consultant</h3>
      <p class="mb-6 text-sm text-gray-500">Are you sure? This will permanently delete the consultant and all their assignments.</p>
      <div class="flex gap-3 justify-end">
        <button class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200" onclick="closeDeleteModal()">Cancel</button>
        <button id="confirm-delete-btn" class="px-4 py-2 text-sm font-medium text-white bg-red-500 rounded-xl hover:bg-red-600">Delete</button>
      </div>
    </div>
  </div>

<script>
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let consultants = [];
let currentView = { type: "summary" };
let deleteTargetId = null;

const avatarColors = [
  { bg: "bg-orange-100", text: "text-orange-600" },
  { bg: "bg-purple-100", text: "text-purple-600" },
  { bg: "bg-blue-100", text: "text-blue-600" },
  { bg: "bg-green-100", text: "text-green-600" },
  { bg: "bg-rose-100", text: "text-rose-600" },
  { bg: "bg-teal-100", text: "text-teal-600" }
];

const skillColors = [
  { bg: "bg-purple-50", text: "text-purple-600" },
  { bg: "bg-blue-50", text: "text-blue-600" },
  { bg: "bg-green-50", text: "text-green-600" },
  { bg: "bg-orange-50", text: "text-orange-600" },
  { bg: "bg-rose-50", text: "text-rose-600" },
  { bg: "bg-teal-50", text: "text-teal-600" }
];

function formatCurrency(num) {
  return num.toLocaleString("sv-SE") + " kr";
}

function formatDate(dateStr) {
  if (!dateStr) return "—";
  const d = new Date(dateStr);
  return d.toLocaleDateString("sv-SE", { year: "numeric", month: "short" });
}

function getEndDateColor(endDateStr) {
  if (!endDateStr) return { badge: "text-gray-500 bg-gray-100", bar: "bg-gray-300", label: "No end date" };
  const now = new Date();
  const end = new Date(endDateStr);
  const diffMs = end - now;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  const diffMonths = diffDays / 30.44;

  if (diffMonths >= 2) return { badge: "text-green-700 bg-green-50", bar: "bg-green-400", label: "Active" };
  if (diffMonths >= 1) return { badge: "text-yellow-700 bg-yellow-50", bar: "bg-yellow-400", label: "Ending soon" };
  if (diffDays > 0) return { badge: "text-red-700 bg-red-50", bar: "bg-red-400", label: "Ending very soon" };
  return { badge: "text-gray-500 bg-gray-100", bar: "bg-gray-400", label: "Ended" };
}

function createProgressRing(percentage, color) {
  const offset = 100 - percentage;
  return `
    <svg class="w-20 h-20" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#E5E7EB" stroke-width="3" />
      <circle cx="18" cy="18" r="15.9155" fill="none" stroke="${color}" stroke-width="3"
        stroke-dasharray="100" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="transform: rotate(-90deg); transform-origin: center;" />
      <text x="18" y="20.5" text-anchor="middle" font-size="7" font-weight="bold" fill="#1F2937">${percentage}%</text>
    </svg>
  `;
}

async function fetchConsultants() {
  const { data, error } = await supabase
    .from("consultants")
    .select("*, previous_assignments(*)")
    .order("name");

  if (error) {
    console.error("Error fetching consultants:", error);
    return;
  }

  consultants = data || [];
}

async function deleteConsultant(id) {
  const { error } = await supabase.from("consultants").delete().eq("id", id);
  if (error) {
    alert("Error deleting consultant: " + error.message);
    return;
  }
  await fetchConsultants();
  navigateTo("summary");
  renderSidebarList();
}

function openDeleteModal(id) {
  deleteTargetId = id;
  document.getElementById("delete-modal").classList.remove("hidden");
}

function closeDeleteModal() {
  deleteTargetId = null;
  document.getElementById("delete-modal").classList.add("hidden");
}

function renderSidebarList() {
  const list = document.getElementById("consultant-list");
  list.innerHTML = consultants.map((c, i) => {
    const color = avatarColors[i % avatarColors.length];
    return `
      <button data-id="${c.id}" class="nav-consultant flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-500 rounded-xl hover:bg-gray-50" onclick="navigateTo('consultant', '${c.id}')">
        <div class="flex items-center justify-center w-8 h-8 text-xs font-bold ${color.text} ${color.bg} rounded-full">${c.initials}</div>
        ${c.name}
      </button>
    `;
  }).join("");
}

function updateSidebarActive() {
  const summaryBtn = document.getElementById("nav-summary");
  const consultantBtns = document.querySelectorAll(".nav-consultant");

  if (currentView.type === "summary" || currentView.type === "add") {
    summaryBtn.className = "flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-orange-600 bg-orange-50 rounded-xl";
  } else {
    summaryBtn.className = "flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-500 rounded-xl hover:bg-gray-50";
  }

  consultantBtns.forEach(btn => {
    const id = btn.dataset.id;
    if (currentView.type === "consultant" && currentView.id === id) {
      btn.className = "nav-consultant flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-orange-600 bg-orange-50 rounded-xl";
    } else {
      btn.className = "nav-consultant flex items-center gap-3 px-4 py-3 text-sm font-medium text-left text-gray-500 rounded-xl hover:bg-gray-50";
    }
  });
}

function navigateTo(type, id) {
  currentView = id ? { type, id } : { type };
  renderView();
  updateSidebarActive();

  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if (!sidebar.classList.contains("-translate-x-full") && window.innerWidth < 1024) {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
  }
}

function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  sidebar.classList.toggle("-translate-x-full");
  overlay.classList.toggle("hidden");
}

function renderView() {
  const container = document.getElementById("main-content");
  if (currentView.type === "summary") {
    container.innerHTML = renderSummary();
  } else if (currentView.type === "add") {
    container.innerHTML = renderAddForm();
    attachFormListeners();
  } else {
    container.innerHTML = renderConsultant(currentView.id);
  }
}

function renderSummary() {
  if (consultants.length === 0) {
    return `
      <h1 class="mb-6 text-2xl font-bold text-gray-900">Dashboard Overview</h1>
      <div class="flex flex-col items-center justify-center p-12 bg-white rounded-2xl shadow-sm">
        <p class="mb-4 text-gray-400">No consultants yet.</p>
        <button class="px-6 py-3 text-sm font-semibold text-white bg-orange-500 rounded-xl hover:bg-orange-600" onclick="navigateTo('add')">Add Your First Consultant</button>
      </div>
    `;
  }

  const totalRevenue = consultants.reduce((sum, c) => sum + (c.total_revenue || 0), 0);
  const avgMargin = Math.round(consultants.reduce((sum, c) => sum + (c.margin || 0), 0) / consultants.length);
  const activeAssignments = consultants.filter(c => c.current_customer).length;
  const totalHours = consultants.reduce((sum, c) => sum + (c.hours_per_month || 0), 0);

  const metricsHTML = `
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
      <div class="flex flex-col p-6 bg-white rounded-2xl shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-500">Total Revenue</span>
          <div class="flex items-center justify-center w-10 h-10 bg-green-50 rounded-xl">
            <svg class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-900">${formatCurrency(totalRevenue)}</span>
        <span class="mt-1 text-xs text-green-500">Active period</span>
      </div>

      <div class="flex flex-col items-center p-6 bg-white rounded-2xl shadow-sm">
        <span class="mb-3 text-sm font-medium text-gray-500">Avg Margin</span>
        ${createProgressRing(avgMargin, "#A78BFA")}
      </div>

      <div class="flex flex-col p-6 bg-white rounded-2xl shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-500">Active Assignments</span>
          <div class="flex items-center justify-center w-10 h-10 bg-blue-50 rounded-xl">
            <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-900">${activeAssignments}</span>
        <span class="mt-1 text-xs text-blue-500">${activeAssignments} consultants placed</span>
      </div>

      <div class="flex flex-col p-6 bg-white rounded-2xl shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-500">Hours This Month</span>
          <div class="flex items-center justify-center w-10 h-10 bg-orange-50 rounded-xl">
            <svg class="w-5 h-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-900">${totalHours.toLocaleString("sv-SE")} h</span>
        <span class="mt-1 text-xs text-orange-500">Combined monthly</span>
      </div>
    </div>
  `;

  const cardsHTML = consultants.map((c, i) => {
    const color = avatarColors[i % avatarColors.length];
    const endColor = getEndDateColor(c.end_date);
    const skillsHTML = (c.skills || []).map((s, si) => {
      const sc = skillColors[si % skillColors.length];
      return `<span class="px-2 py-1 text-xs ${sc.text} ${sc.bg} rounded-full">${s}</span>`;
    }).join("");

    return `
      <div class="flex flex-col p-6 bg-white rounded-2xl shadow-sm cursor-pointer hover:shadow-md transition-shadow" onclick="navigateTo('consultant', '${c.id}')">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-10 h-10 text-sm font-bold ${color.text} ${color.bg} rounded-full">${c.initials}</div>
            <div>
              <h3 class="text-sm font-semibold text-gray-900">${c.name}</h3>
              <p class="text-xs text-gray-400">${c.current_customer || "Unassigned"}</p>
            </div>
          </div>
          <span class="px-2 py-1 text-xs font-medium ${endColor.badge} rounded-full">${endColor.label}</span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <p class="text-xs text-gray-400">Price</p>
            <p class="text-sm font-semibold text-gray-900">${c.price} kr/h</p>
          </div>
          <div>
            <p class="text-xs text-gray-400">Margin</p>
            <p class="text-sm font-semibold text-green-600">${c.margin}%</p>
          </div>
          <div>
            <p class="text-xs text-gray-400">Start</p>
            <p class="text-sm font-semibold text-gray-900">${formatDate(c.start_date)}</p>
          </div>
          <div>
            <p class="text-xs text-gray-400">End</p>
            <p class="text-sm font-semibold text-gray-900">${formatDate(c.end_date)}</p>
          </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
          ${skillsHTML}
        </div>

        <div class="mt-auto">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs text-gray-400">Margin</span>
            <span class="text-xs font-medium text-gray-600">${c.margin}%</span>
          </div>
          <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full ${endColor.bar} rounded-full" style="width: ${c.margin}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join("");

  return `
    <h1 class="mb-6 text-2xl font-bold text-gray-900">Dashboard Overview</h1>
    ${metricsHTML}
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-lg font-semibold text-gray-900">Consultants & Assignments</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      ${cardsHTML}
    </div>
  `;
}

function renderConsultant(id) {
  const c = consultants.find(x => x.id === id);
  if (!c) return "<p>Consultant not found.</p>";

  const colorIdx = consultants.indexOf(c);
  const color = avatarColors[colorIdx % avatarColors.length];
  const endColor = getEndDateColor(c.end_date);
  const prevAssignments = c.previous_assignments || [];

  const metricsHTML = `
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
      <div class="flex flex-col p-6 bg-white rounded-2xl shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-500">Total Revenue</span>
          <div class="flex items-center justify-center w-10 h-10 bg-green-50 rounded-xl">
            <svg class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-900">${formatCurrency(c.total_revenue || 0)}</span>
        <span class="mt-1 text-xs text-green-500">Current assignment</span>
      </div>

      <div class="flex flex-col items-center p-6 bg-white rounded-2xl shadow-sm">
        <span class="mb-3 text-sm font-medium text-gray-500">Accumulated Margin</span>
        ${createProgressRing(c.margin || 0, "#A78BFA")}
        <span class="mt-2 text-sm font-semibold text-gray-900">${formatCurrency(c.accumulated_margin || 0)}</span>
      </div>

      <div class="flex flex-col p-6 bg-white rounded-2xl shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-500">Hours / Month</span>
          <div class="flex items-center justify-center w-10 h-10 bg-orange-50 rounded-xl">
            <svg class="w-5 h-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-900">${c.hours_per_month || 0} h</span>
        <span class="mt-1 text-xs text-orange-500">Monthly average</span>
      </div>

      <div class="flex flex-col p-6 bg-white rounded-2xl shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-gray-500">Previous Assignments</span>
          <div class="flex items-center justify-center w-10 h-10 bg-blue-50 rounded-xl">
            <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
          </div>
        </div>
        <span class="text-2xl font-bold text-gray-900">${prevAssignments.length}</span>
        <span class="mt-1 text-xs text-blue-500">Completed</span>
      </div>
    </div>
  `;

  const skillsHTML = (c.skills || []).map((s, si) => {
    const sc = skillColors[si % skillColors.length];
    return `<span class="px-3 py-1.5 text-sm ${sc.text} ${sc.bg} rounded-full">${s}</span>`;
  }).join("");

  const currentHTML = `
    <div class="mb-10">

function attachFormListeners() {
  const form = document.getElementById("add-form");
  if (!form) return;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const errorEl = document.getElementById("form-error");

    const name = fd.get("name").trim();
    const initials = fd.get("initials").trim().toUpperCase();

    if (!name || !initials) {
      errorEl.textContent = "Name and initials are required.";
      errorEl.classList.remove("hidden");
      return;
    }

    const skillsRaw = fd.get("skills").trim();
    const skills = skillsRaw ? skillsRaw.split(",").map(s => s.trim()).filter(Boolean) : [];

    const row = {
      name,
      initials,
      current_customer: fd.get("current_customer").trim() || null,
      start_date: fd.get("start_date") || null,
      end_date: fd.get("end_date") || null,
      price: parseInt(fd.get("price")) || 0,
      margin: parseInt(fd.get("margin")) || 0,
      total_revenue: parseInt(fd.get("total_revenue")) || 0,
      accumulated_margin: parseInt(fd.get("accumulated_margin")) || 0,
      hours_per_month: parseInt(fd.get("hours_per_month")) || 0,
      skills
    };

    const { error } = await supabase.from("consultants").insert([row]);

    if (error) {
      errorEl.textContent = "Error adding consultant: " + error.message;
      errorEl.classList.remove("hidden");
      return;
    }

    await fetchConsultants();
    renderSidebarList();
    navigateTo("summary");
  });
}

async function handleLogin(email, password) {
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  return error;
}

async function handleLogout() {
  await supabase.auth.signOut();
  showLogin();
}

function showLogin() {
  document.getElementById("login-screen").classList.remove("hidden");
  document.getElementById("app").classList.add("hidden");
}

async function showApp() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  await fetchConsultants();
  renderSidebarList();
  renderView();
  updateSidebarActive();
}

document.getElementById("sidebar-overlay").addEventListener("click", () => {
  document.getElementById("sidebar").classList.add("-translate-x-full");
  document.getElementById("sidebar-overlay").classList.add("hidden");
});

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("login-email").value;
  const password = document.getElementById("login-password").value;
  const errorEl = document.getElementById("login-error");

  errorEl.classList.add("hidden");

  const error = await handleLogin(email, password);
  if (error) {
    errorEl.textContent = error.message;
    errorEl.classList.remove("hidden");
    return;
  }

  await showApp();
});

document.getElementById("confirm-delete-btn").addEventListener("click", async () => {
  if (deleteTargetId) {
    await deleteConsultant(deleteTargetId);
    closeDeleteModal();
  }
});

document.addEventListener("DOMContentLoaded", async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    await showApp();
  } else {
    showLogin();
  }
});
</script>
